name: Raymond Tests

on:
  push:
    paths:
      - 'raymond/**'

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: raymond
        run: pip install -r requirements.txt

      - name: Run Behave tests
        working-directory: raymond
        run: behave